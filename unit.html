<html lang="zh-TW">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* 全域變數定義 */
        :root {
            --primary-brown: #6C4E44;
            --dark-brown: #4E3530;
            --light-brown: #8D6B63;
            --gold-accent: #D4A96A;
            --hover-orange: #C4896A;
        }

        /* 專業暖棕漸層背景 */
        body {
            background: linear-gradient(135deg, var(--dark-brown) 0%, var(--primary-brown) 50%, var(--light-brown) 100%);
            background-attachment: fixed;
            color: #2d3748;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        /* 柔和光點背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 15% 20%, rgba(212, 169, 106, 0.1) 0%, transparent 25%),
                radial-gradient(circle at 85% 80%, rgba(196, 137, 106, 0.08) 0%, transparent 30%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.05) 0%, transparent 35%);
            z-index: -1;
            pointer-events: none;
        }

        /* 導航列 - 統一使用深色調 */
        .navbar {
            background: rgba(78, 53, 48, 0.9) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(212, 169, 106, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: background 0.3s ease;
        }

        .navbar-brand {
            color: var(--gold-accent) !important;
            font-weight: 700;
            font-size: 1.5rem;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.95) !important;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: var(--gold-accent) !important;
        }

        /* 單元導航按鈕 */
        .unit-nav-container {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            pointer-events: none;
        }

        .unit-nav-left { left: 20px; }
        .unit-nav-right { right: 20px; }

        .unit-nav-btn {
            background: rgba(108, 78, 68, 0.9);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(212, 169, 106, 0.3);
            backdrop-filter: blur(10px);
        }

        .unit-nav-btn:hover {
            background: var(--hover-orange);
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(212, 169, 106, 0.5);
        }

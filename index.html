    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        /* ============================================================
           主色調調整說明
           原主色 → 新主色 #6C4E44（暖棕/咖啡色調）
           衍生色系：
             --color-primary:      #6C4E44  主色（暖棕）
             --color-primary-dark: #4E3530  深棕（hover/深色背景用）
             --color-primary-light:#8D6B63  淺棕（次要元素）
             --color-accent:       #C4896A  暖橘棕（強調/highlight）
             --color-accent-light: #E8C5AD  米棕（背景/輔助）
             --color-gold:         #D4A96A  金棕（取代原金黃 #ffd966）
             --color-bg-light:     #F5EDE8  極淺棕（section bg-light 替換）
             --color-text-on-primary: #FFFFFF  主色上的文字
           ============================================================ */

        :root {
            --color-primary:       #6C4E44; /* 【調整】主色：暖棕 */
            --color-primary-dark:  #4E3530; /* 【調整】深棕：用於深色背景、footer */
            --color-primary-light: #8D6B63; /* 【調整】淺棕：次要按鈕、hover */
            --color-accent:        #C4896A; /* 【調整】強調色：暖橘棕，取代原藍/青色系 */
            --color-accent-light:  #E8C5AD; /* 【調整】極淺強調：背景用 */
            --color-gold:          #D4A96A; /* 【調整】金棕：取代原 #ffd966 金黃 */
            --color-bg-light:      #F5EDE8; /* 【調整】淺背景：bg-light section 替換 */
        }

        /* ===== Navbar ===== */
        .navbar {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(108,78,68,0.15); /* 【調整】陰影色 */
            transition: all 0.3s ease;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--color-primary) !important; /* 【調整】品牌色 */
        }

        .nav-link {
            color: #555 !important;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-link:hover {
            color: var(--color-primary) !important; /* 【調整】hover 色 */
        }

        /* ===== Hero Section ===== */
        .hero {
            background: linear-gradient(
                135deg,
                var(--color-primary-dark) 0%,   /* 【調整】漸層起點：深棕 */
                var(--color-primary) 40%,         /* 【調整】漸層中段：主色 */
                var(--color-primary-light) 100%   /* 【調整】漸層終點：淺棕 */
            );
            padding: 100px 0 80px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: rgba(212,169,106,0.12); /* 【調整】裝飾圓：金棕透明 */
            border-radius: 50%;
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -5%;
            width: 350px;
            height: 350px;
            background: rgba(196,137,106,0.1); /* 【調整】裝飾圓：暖橘棕透明 */
            border-radius: 50%;
            pointer-events: none;
        }

        .hero h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .hero .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .hero a.text-white:hover {
            color: var(--color-gold) !important; /* 【調整】hero 連結 hover：金棕 */
            text-decoration: underline;
        }

        /* ===== Profile Image ===== */
        .profile-img {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border-radius: 50%;
            border: 5px solid var(--color-gold); /* 【調整】頭像邊框：金棕 */
            box-shadow: 0 20px 60px rgba(78,53,48,0.4); /* 【調整】陰影色 */
        }

        /* ===== Title Lines (bullet decoration) ===== */
        .titles-container {
            margin-bottom: 0.8rem;
        }

        .title-line {
            position: relative;
            padding-left: 1.6rem;
            font-weight: bold;
            color: var(--color-gold) !important; /* 【調整】標題文字：金棕（取代 #ffd966）*/
            margin-bottom: 0.2rem !important;
            display: flex;
            align-items: center;
        }

        .title-line:before {
            content: "●";
            color: var(--color-gold); /* 【調整】bullet 色：金棕 */
            font-size: 0.75em;
            margin-right: 0.6rem;
            text-shadow:
                0 1px 2px rgba(0,0,0,0.45),
                0 0 4px rgba(212,169,106,0.4); /* 【調整】bullet glow：金棕 */
        }

        .title-line:last-child {
            margin-bottom: 0 !important;
        }

        /* ===== Section Titles ===== */
        .section-title {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 3rem;
            color: var(--color-primary); /* 【調整】區塊標題色 */
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: var(--color-accent); /* 【調整】標題底線：暖橘棕 */
            margin: 0.5rem auto 0;
            border-radius: 2px;
        }

        /* ===== About Section ===== */
        .section {
            padding: 80px 0;
        }

        /* bg-light section 替換 */
        .bg-light {
            background-color: var(--color-bg-light) !important; /* 【調整】淺背景色 */
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(108,78,68,0.12); /* 【調整】卡片陰影 */
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 50px rgba(108,78,68,0.18); /* 【調整】hover 陰影 */
        }

        /* ===== Filter Buttons ===== */
        .filter-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .filter-btn {
            border: 2px solid var(--color-primary); /* 【調整】按鈕邊框 */
            color: var(--color-primary);             /* 【調整】按鈕文字 */
            background: transparent;
            border-radius: 50px;
            padding: 0.4rem 1.2rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--color-primary);        /* 【調整】active/hover 背景 */
            color: white;
            border-color: var(--color-primary);
        }

        /* ===== Project Cards ===== */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.2rem;
        }

        .project-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(108,78,68,0.08); /* 【調整】專案卡片陰影 */
            border-top: 4px solid var(--color-accent);   /* 【調整】專案卡片上邊框：暖橘棕 */
        }

        .project-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(108,78,68,0.18); /* 【調整】hover 陰影 */
        }

        .project-number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--color-accent-light);  /* 【調整】專案編號色：極淺棕 */
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .project-card small.text-primary {
            color: var(--color-primary) !important; /* 【調整】「點擊查看詳情」文字色 */
        }

        /* ===== Contact Section ===== */
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .contact-item {
            display: flex;
            align-items: flex-start;
            gap: 1.2rem;
            padding: 1.5rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(108,78,68,0.08); /* 【調整】聯絡項目陰影 */
        }

        .contact-item i {
            font-size: 1.5rem;
            color: var(--color-primary); /* 【調整】聯絡 icon 色 */
            margin-top: 0.2rem;
            min-width: 2rem;
            text-align: center;
        }

        .contact-item h5 {
            margin-bottom: 0.3rem;
            color: var(--color-primary); /* 【調整】聯絡標題色 */
            font-weight: 600;
        }

        .contact-item a {
            color: var(--color-accent); /* 【調整】聯絡連結色 */
            text-decoration: none;
        }

        .contact-item a:hover {
            color: var(--color-primary); /* 【調整】聯絡連結 hover */
            text-decoration: underline;
        }

        /* ===== Student Links ===== */
        .student-links a {
            color: var(--color-accent-light); /* 【調整】學生連結色 */
            text-decoration: none;
            transition: color 0.2s;
        }

        .student-links a:hover {
            color: var(--color-gold); /* 【調整】學生連結 hover */
            text-decoration: underline;
        }

        /* ===== Footer ===== */
        .footer {
            background: var(--color-primary-dark); /* 【調整】footer 背景：深棕 */
            color: rgba(255,255,255,0.85);
            text-align: center;
            padding: 1.5rem 0;
            font-size: 0.9rem;
        }

        /* ===== Fade-in Animation ===== */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>

    <script>
        // Project data
        const projects = [
            {id: 1, category: 'tools', title: '單元 #1', description: '個人網頁建置、MediaPipe、環境 - 其他工具專案'},
            {id: 2, category: 'tools', title: '單元 #2', description: 'CV2 - 其他工具專案'},
            {id: 3, category: 'perception', title: '單元 #3', description: '物件偵測 - 感知式AI'},
            {id: 4, category: 'perception', title: '單元 #4', description: '影像分割 - 感知式AI'},
            {id: 5, category: 'perception', title: '單元 #5', description: '人臉偵測 - 感知式AI'},
            {id: 6, category: 'perception', title: '單元 #6', description: '人臉特徵點偵測 - 感知式AI'},
            {id: 7, category: 'perception', title: '單元 #7', description: '姿態特徵點偵測 - 感知式AI'},
            {id: 8, category: 'perception', title: '單元 #8', description: '手部特徵點 - 感知式AI'},
            {id: 9, category: 'perception', title: '單元 #9', description: '手勢辨識 - 感知式AI'},
            {id: 10, category: 'tools', title: '單元 #10', description: 'Streamlit - 其他工具專案'},
            {id: 11, category: 'generative', title: '單元 #11', description: '本地大型語言模型 - 生成式AI'},
            {id: 12, category: 'generative', title: '單元 #12', description: '神經風格轉換 - 生成式AI'},
            {id: 13, category: 'generative', title: '單元 #13', description: 'Torch - 生成式AI'},
            {id: 14, category: 'generative', title: '單元 #14', description: '任意影像即時神經風格轉換 - 生成式AI'},
            {id: 15, category: 'perception', title: '單元 #15', description: 'YOLO - 感知式AI'},
            {id: 16, category: 'generative', title: '單元 #16', description: '使用Python呼叫LLM API - 生成式AI'},
            {id: 17, category: 'generative', title: '單元 #17', description: '從零開始建構LLM - 生成式AI'},
            {id: 18, category: 'generative', title: '單元 #18', description: 'RAG簡介、LangChain - 生成式AI'},
            {id: 19, category: 'agentic', title: '單元 #19', description: 'AI代理、MCP、n8n - 代理式AI'},
            {id: 20, category: 'agentic', title: '單元 #20', description: '進階n8n - 代理式AI'},
            {id: 21, category: 'agentic', title: '單元 #21', description: 'Google Opal - 代理式AI'},
            {id: 22, category: 'agentic', title: '單元 #22', description: 'Claude Skills - 代理式AI'},
            {id: 23, category: 'agentic', title: '單元 #23', description: 'OpenAI Agent Builder - 代理式AI'},
            {id: 24, category: 'agentic', title: '單元 #24', description: '新的代理式AI應用 - 代理式AI'}
        ];

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            loadProfileData();
            renderProjects('all');
            initScrollAnimations();
            initSmoothScrolling();
        });

        // Load profile data
        function loadProfileData() {
            document.getElementById('name').textContent = profileData.name;
            document.getElementById('title1').textContent = profileData.title1;
            document.getElementById('title2').textContent = profileData.title2;
            document.getElementById('expertise').textContent = profileData.expertise;
            document.getElementById('education').textContent = profileData.education;
            document.getElementById('email').textContent = profileData.email;
            document.getElementById('email').href = `mailto:${profileData.email}`;
            document.getElementById('linkedin').href = profileData.linkedin;
            document.getElementById('linkedin-text').textContent = profileData.linkedin;
            const aboutText = [profileData.about1, profileData.about2, profileData.about3, profileData.about4]
                .filter(text => text && text.trim())
                .join(' ');
            document.getElementById('about-text').innerHTML = aboutText;
            document.getElementById('contact-email1').textContent = profileData.email;
            document.getElementById('contact-email1').href = `mailto:${profileData.email}`;
            document.getElementById('contact-phone').textContent = profileData.phone;
            document.getElementById('contact-location').innerHTML = profileData.location;
        }

        // Filter and render projects
        function filterProjects(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderProjects(category);
        }

        function renderProjects(category) {
            const grid = document.getElementById('projects-grid');
            const filteredProjects = category === 'all' ? projects : projects.filter(p => p.category === category);

            grid.innerHTML = filteredProjects.map(project => {
                return `
                    <div class="project-card" data-category="${project.category}" onclick="openProject(${project.id})">
                        <div class="project-number">${project.id}</div>
                        <h5>${project.title}</h5>
                        <p class="text-muted">${project.description}</p>
                        <small class="text-primary">點擊查看詳情</small>
                    </div>
                `;
            }).join('');
        }

        // Open project details
        function openProject(id) {
            window.open(`unit.html?unit=${id}`, '_blank');
        }

        // Scroll animations
        function initScrollAnimations() {
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.fade-in').forEach(el => {
                observer.observe(el);
            });
        }

        // Smooth scrolling for navigation links
        function initSmoothScrolling() {
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        const headerOffset = 70;
                        const elementPosition = target.getBoundingClientRect().top;
                        const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                        window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
                    }
                });
            });
        }

        // Navbar background on scroll
        window.addEventListener('scroll', function() {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.style.background = 'rgba(255,255,255,0.98)';
            } else {
                navbar.style.background = 'rgba(255,255,255,0.95)';
            }
        });
